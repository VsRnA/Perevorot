services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: perevorot
      POSTGRES_USER: perevorot
      POSTGRES_PASSWORD: perevorot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  server:
    build: ./server
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: perevorot
      DB_USER: perevorot
      DB_PASSWORD: perevorot
      JWT_SECRET: supersecret
      CLIENT_URL: http://localhost:5173
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    build: ./client
    ports:
      - "5173:5173"
    depends_on:
      - server

volumes:
  postgres_data:
